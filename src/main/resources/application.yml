server:
  port: 8080

spring:
  application:
    name: springboot-demo

  # 数据库配置 (H2 内存数据库)
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

# RocketMQ 配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: demo-producer-group
    send-message-timeout: 30000